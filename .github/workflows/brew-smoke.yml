name: brew-smoke

on:
  workflow_dispatch:
  workflow_call:

jobs:
  install:
    runs-on: macos-latest
    steps:
      - name: Show brew and runner info
        run: |
          sw_vers
          uname -m
          brew --version
          brew --prefix

      - name: Ensure no prior nrflo state
        run: |
          brew uninstall --cask nrflo 2>/dev/null || true
          brew untap nrflo/tap 2>/dev/null || true
          rm -rf ~/Library/Caches/Homebrew/api/

      - name: Tap nrflo/tap
        run: brew tap nrflo/tap

      - name: Install cask
        run: brew install --cask nrflo

      - name: Verify binaries on PATH
        run: |
          which nrflo
          which nrflo_server
          nrflo_server version
