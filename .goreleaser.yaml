version: 2

project_name: nrflo

before:
  hooks:
    - rm -rf ui/dist
    - sh -c "cd ui && npm ci && npm run build"
    - rm -rf be/internal/static/dist
    - cp -r ui/dist be/internal/static/dist
    - cp agent_manual.md be/internal/static/agent_manual.md

builds:
  - id: nrflo
    binary: nrflo
    dir: be
    main: ./cmd/nrflo
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X be/internal/cli.version={{ .Version }}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - id: nrflo_server
    binary: nrflo_server
    dir: be
    main: ./cmd/server
    tags:
      - tray
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w -X be/internal/cli.version={{ .Version }}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=clang -arch x86_64
          - CGO_CFLAGS=-arch x86_64
          - CGO_LDFLAGS=-arch x86_64

archives:
  - id: default
    ids:
      - nrflo
      - nrflo_server
    name_template: "nrflo_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: nrflo
    name: nrflo

homebrew_casks:
  - name: nrflo
    ids:
      - default
    binaries:
      - nrflo
      - nrflo_server
    repository:
      owner: nrflo
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/nrflo/nrflo
    description: Multi-workflow agent orchestration system
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}"]
    caveats: |
      Database is stored at ~/.nrflo/nrflo.data by default.
      Override with NRFLO_HOME environment variable.

      To start the server: nrflo_server serve
